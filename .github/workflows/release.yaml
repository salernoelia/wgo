name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: wgo-linux
            binary_path: target/release/wgo

          - os: macos-latest
            artifact_name: wgo-macos.app.tar.gz
            binary_path: target/release/wgo

          - os: windows-latest
            artifact_name: wgo-windows.exe
            binary_path: target/release/wgo.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Bundle macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          APP=wgo.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp target/release/wgo "$APP/Contents/MacOS/wgo"
          cp assets/icon.icns "$APP/Contents/Resources/icon.icns"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>          <string>wgo</string>
            <key>CFBundleExecutable</key>    <string>wgo</string>
            <key>CFBundleIdentifier</key>    <string>com.yourname.wgo</string>
            <key>CFBundleVersion</key>       <string>1.0</string>
            <key>CFBundlePackageType</key>   <string>APPL</string>
            <key>CFBundleIconFile</key>      <string>icon</string>
          </dict>
          </plist>
          EOF
          tar -czf wgo-macos.app.tar.gz "$APP"

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/release/wgo wgo-linux

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        env:
          CARGO_INCREMENTAL: "0"
        run: cargo build --release
        shell: bash
        
      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/release/wgo.exe wgo-windows.exe
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}